<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Produkcja</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/12721/12721102.png?v=4">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/12721/12721102.png?v=4">

    <style>
        :root { --bg: #121214; --card-bg: #1c1c1e; --nav-bg: #2c2c2e; --primary: #0a84ff; --success: #32d74b; --danger: #ff453a; --warning: #ffd60a; --text-main: #ffffff; --text-dim: #8e8e93; --border: #38383a; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: var(--text-main); }
        .container { max-width: 500px; margin: auto; }
        .sync-status { text-align: center; font-size: 11px; margin: 10px 0; color: var(--text-dim); }
        .card { background: var(--card-bg); padding: 15px; border-radius: 12px; display: none; margin-bottom: 10px; border: 1px solid var(--border); }
        .card.active { display: block; }
        .nav { display: flex; background: var(--nav-bg); padding: 4px; border-radius: 10px; margin-bottom: 15px; }
        .nav-btn { flex: 1; border: none; padding: 12px 5px; border-radius: 8px; font-weight: 600; color: var(--text-dim); background: none; font-size: 11px; text-transform: uppercase; }
        .nav-btn.active { background: var(--primary); color: white; }
        label { display: block; font-size: 10px; font-weight: 700; color: var(--text-dim); margin-top: 12px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; margin-top: 5px; font-size: 16px; box-sizing: border-box; background: #2c2c2e; color: white; }
        .row { display: flex; gap: 8px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: 700; font-size: 16px; cursor: pointer; color: white; margin-top: 15px; }
        .btn-green { background: var(--success); }
        .btn-blue { background: var(--primary); }
        .btn-orange { background: #ff9500; }
        .btn-grey { background: #3a3a3c; }
        .prod-cost-display { background: rgba(255, 214, 10, 0.1); padding: 12px; border-radius: 10px; margin-top: 15px; font-weight: 800; text-align: center; color: var(--warning); border: 1px solid var(--warning); }
        .year-box { background: #000; padding: 20px; border-radius: 12px; margin-bottom: 15px; text-align: center; border: 1px solid var(--primary); }
        .year-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px; font-size: 10px; color: var(--text-dim); border-top: 1px solid var(--border); padding-top: 10px; }
        .month-acc { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
        .month-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .month-content { display: none; padding: 10px; border-top: 1px solid var(--border); background: #151517; }
        .month-content.open { display: block; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 10px 5px; border-bottom: 1px solid var(--border); font-size: 12px; }
        .btn-del { color: var(--danger); background: none; border: 1px solid var(--danger); padding: 4px 8px; border-radius: 5px; font-size: 10px; }
        .mode-switch { display: flex; gap: 5px; margin-top: 5px; background: #000; padding: 4px; border-radius: 8px; }
        .mode-opt { flex:1; text-align:center; padding: 8px; font-size: 10px; font-weight: 700; border-radius: 6px; cursor:pointer; color: #8e8e93; }
        .mode-opt.active { background: #3a3a3c; color: white; }
        .salary-row { background: rgba(255, 149, 0, 0.05); }
    </style>
</head>
<body>

<div class="container">
    <div id="status" class="sync-status">Ładowanie systemu...</div>
    <button id="auth_btn" class="btn btn-blue" style="margin-bottom:20px;">ZALOGUJ PRZEZ GOOGLE</button>

    <div class="nav">
        <button id="tab1" class="nav-btn active" onclick="switchTab('calc')">KREATOR</button>
        <button id="tab2" class="nav-btn" onclick="switchTab('sales')">SPRZEDAŻ</button>
        <button id="tab3" class="nav-btn" onclick="switchTab('stats')">WYNIKI</button>
    </div>

    <div id="calc" class="card active">
        <input type="hidden" id="editIdx" value="-1">
        <label>Nazwa modelu</label><input type="text" id="pName">
        <div class="row">
            <div style="flex:1"><label>Deska/m³</label><input type="text" inputmode="decimal" id="pWood" value="1000"></div>
            <div style="flex:1"><label>Klocek/m³</label><input type="text" inputmode="decimal" id="pBlocks" value="1200"></div>
        </div>
        <label>Deska 1 (Dł x Sz x Gr)</label>
        <div class="row"><input type="text" inputmode="decimal" id="d1L" placeholder="Dł"><input type="text" inputmode="decimal" id="d1S" placeholder="Sz"><input type="text" inputmode="decimal" id="d1G" placeholder="Gr"></div>
        <label>Ilość Desek 1</label><input type="text" inputmode="decimal" id="d1Qty">
        <label>Deska 2 (Dł x Sz x Gr)</label>
        <div class="row"><input type="text" inputmode="decimal" id="d2L" placeholder="Dł"><input type="text" inputmode="decimal" id="d2S" placeholder="Sz"><input type="text" inputmode="decimal" id="d2G" placeholder="Gr"></div>
        <label>Ilość Desek 2</label><input type="text" inputmode="decimal" id="d2Qty" value="0">
        <label>Klocki (szt)</label><input type="text" inputmode="decimal" id="bQty">
        <div id="liveCostDisplay" class="prod-cost-display">0.00 PLN</div>
        <button id="saveBtn" class="btn btn-green" onclick="saveModel()">ZAPISZ MODEL</button>
        <button id="cancelEditBtn" class="btn btn-grey" style="display:none;" onclick="cancelEdit()">ANULUJ</button>
        <div style="margin-top:20px"><label>TWOJE MODELE:</label><table id="editModelList"></table></div>
    </div>

    <div id="sales" class="card">
        <div class="mode-switch">
            <div id="optProd" class="mode-opt active" onclick="setSaleMode('prod')">WŁASNA PRODUKCJA</div>
            <div id="optBuy" class="mode-opt" onclick="setSaleMode('buy')">KUPNO-SPRZEDAŻ</div>
        </div>
        <div id="prodFields">
            <label>Model</label><select id="palletSelect" onchange="updateProfitHint()"></select>
        </div>
        <div id="buyFields" style="display:none;">
            <label>Nazwa towaru</label><input type="text" id="buyName" placeholder="Np. Paleta używana">
            <label>Cena zakupu (szt)</label><input type="text" inputmode="decimal" id="buyCost" oninput="updateProfitHint()">
        </div>
        <label>Klient</label><input type="text" id="clientName">
        <div class="row">
            <div style="flex:1"><label>Ilość</label><input type="text" inputmode="decimal" id="saleQty"></div>
            <div style="flex:1"><label>Cena sprzedaży</label><input type="text" inputmode="decimal" id="salePrice" oninput="updateProfitHint()"></div>
        </div>
        <div id="profitHint" style="margin-top:15px; text-align:center;"></div>
        <button class="btn btn-blue" onclick="addSale()">DODAJ SPRZEDAŻ</button>
        <hr style="margin:25px 0; border:0; border-top:1px solid var(--border);">
        <label style="color:var(--warning)">Zaksięguj Tygodniówkę</label>
        <input type="date" id="salaryDate">
        <input type="text" inputmode="decimal" id="salaryAmount" placeholder="Kwota tygodniówki (PLN)">
        <button class="btn btn-orange" onclick="addWeeklySalary()">ROZLICZ TYGODNIÓWKĘ</button>
    </div>

    <div id="stats" class="card"><div id="yearStatsContainer"></div><div id="monthsContainer"></div></div>
</div>

<script>
    const CLIENT_ID = '255899802465-gk7mkvkdsd48peoh2pss3aql245knt59.apps.googleusercontent.com';
    const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
    const SCOPES = 'https://www.googleapis.com/auth/drive.appdata';

    let tokenClient, gapiInited = false, gisInited = false, fileId = null, saleMode = 'prod';
    let db = { models: [], sales: [] };

    function gapiLoaded() { gapi.load('client', async () => { await gapi.client.init({ discoveryDocs: [DISCOVERY_DOC] }); gapiInited = true; checkAuth(); }); }
    function gisLoaded() { tokenClient = google.accounts.oauth2.initTokenClient({ client_id: CLIENT_ID, scope: SCOPES, callback: async (resp) => { gapi.client.setToken(resp); localStorage.setItem('g_token', JSON.stringify(resp)); document.getElementById('auth_btn').style.display = 'none'; await initializeFile(); } }); gisInited = true; checkAuth(); }
    
    async function checkAuth() { 
        const savedToken = localStorage.getItem('g_token'); 
        if (savedToken) { gapi.client.setToken(JSON.parse(savedToken)); if (gapiInited) { const connected = await initializeFile(); if (connected) document.getElementById('auth_btn').style.display = 'none'; } } 
    }

    document.getElementById('auth_btn').onclick = () => { if (tokenClient) tokenClient.requestAccessToken({prompt: 'consent'}); else alert("Ładowanie..."); };

    async function initializeFile() {
        try {
            const resp = await gapi.client.drive.files.list({ q: "name='data_palety.json' and trashed = false", spaces: 'appDataFolder' });
            const files = resp.result.files;
            if (files.length > 0) {
                fileId = files[0].id;
                const content = await gapi.client.drive.files.get({ fileId: fileId, alt: 'media' });
                db = content.result || { models: [], sales: [] };
                document.getElementById('status').innerText = "Połączono ✅";
                renderSelect(); renderStats(); renderModelEditList(); return true;
            } else { await saveToCloud(); return true; }
        } catch (err) { return false; }
    }

    async function saveToCloud() {
        document.getElementById('status').innerText = "Zapisywanie... ⏳";
        try {
            let response;
            if (!fileId) {
                const metadata = { name: 'data_palety.json', parents: ['appDataFolder'] };
                const boundary = 'foo_bar_baz';
                const delimiter = "\r\n--" + boundary + "\r\n";
                const multipartBody = delimiter + 'Content-Type: application/json\r\n\r\n' + JSON.stringify(metadata) + delimiter + 'Content-Type: application/json\r\n\r\n' + JSON.stringify(db) + "\r\n--" + boundary + "--";
                response = await gapi.client.request({ path: '/upload/drive/v3/files', method: 'POST', params: { uploadType: 'multipart' }, headers: { 'Content-Type': 'multipart/related; boundary=' + boundary }, body: multipartBody });
                if (response.result.id) fileId = response.result.id;
            } else {
                response = await gapi.client.request({ path: '/upload/drive/v3/files/' + fileId, method: 'PATCH', params: { uploadType: 'media' }, body: JSON.stringify(db) });
            }
            if (response.status === 200) { document.getElementById('status').innerText = "Zapisano ✅"; return true; }
        } catch (err) { return false; }
    }

    function setSaleMode(m) {
        saleMode = m;
        document.getElementById('optProd').classList.toggle('active', m === 'prod');
        document.getElementById('optBuy').classList.toggle('active', m === 'buy');
        document.getElementById('prodFields').style.display = m === 'prod' ? 'block' : 'none';
        document.getElementById('buyFields').style.display = m === 'buy' ? 'block' : 'none';
        updateProfitHint();
    }

    function calculateLiveCost() {
        const pw = parseFloat(document.getElementById('pWood').value.replace(',', '.')) || 0;
        const pb = parseFloat(document.getElementById('pBlocks').value.replace(',', '.')) || 0;
        const getV = (l, s, g, q) => (parseFloat(String(l).replace(',', '.'))*parseFloat(String(s).replace(',', '.'))*parseFloat(String(g).replace(',', '.'))/1000000) * (parseInt(q)||0);
        const v = getV(document.getElementById('d1L').value, document.getElementById('d1S').value, document.getElementById('d1G').value, document.getElementById('d1Qty').value) + getV(document.getElementById('d2L').value, document.getElementById('d2S').value, document.getElementById('d2G').value, document.getElementById('d2Qty').value);
        const vb = (7.5 * 7.5 * 7.8 / 1000000) * (parseInt(document.getElementById('bQty').value) || 0);
        const cost = (v * pw) + (vb * pb);
        document.getElementById('liveCostDisplay').innerText = cost.toFixed(2) + " PLN / szt.";
        return cost;
    }
    document.querySelectorAll('#calc input').forEach(input => input.addEventListener('input', calculateLiveCost));

    function saveModel() {
        const n = document.getElementById('pName').value;
        const cost = calculateLiveCost();
        const editIdx = parseInt(document.getElementById('editIdx').value);
        if(!n || cost <= 0) return alert("Błąd!");
        const modelData = { name: n, cost: cost, pWood: document.getElementById('pWood').value, pBlocks: document.getElementById('pBlocks').value, d1L: document.getElementById('d1L').value, d1S: document.getElementById('d1S').value, d1G: document.getElementById('d1G').value, d1Qty: document.getElementById('d1Qty').value, d2L: document.getElementById('d2L').value, d2S: document.getElementById('d2S').value, d2G: document.getElementById('d2G').value, d2Qty: document.getElementById('d2Qty').value, bQty: document.getElementById('bQty').value };
        if(editIdx > -1) db.models[editIdx] = modelData; else db.models.push(modelData);
        cancelEdit(); saveToCloud().then(() => { renderSelect(); renderModelEditList(); });
    }

    function renderModelEditList() { document.getElementById('editModelList').innerHTML = db.models.map((m, i) => `<tr><td>${m.name}</td><td style="text-align:right"><button class="btn-del" style="color:var(--primary); border-color:var(--primary); margin-right:5px" onclick="startEdit(${i})">EDYCJA</button><button class="btn-del" onclick="deleteModel(${i})">X</button></td></tr>`).join(''); }
    function startEdit(i) {
        const m = db.models[i]; document.getElementById('editIdx').value = i; document.getElementById('pName').value = m.name;
        ['pWood','pBlocks','d1L','d1S','d1G','d1Qty','d2L','d2S','d2G','d2Qty','bQty'].forEach(k => document.getElementById(k).value = m[k] || "");
        document.getElementById('saveBtn').innerText = "AKTUALIZUJ"; document.getElementById('saveBtn').className = "btn btn-orange"; document.getElementById('cancelEditBtn').style.display = "block"; calculateLiveCost(); window.scrollTo(0,0);
    }
    function cancelEdit() { document.getElementById('editIdx').value = "-1"; document.getElementById('saveBtn').innerText = "ZAPISZ MODEL"; document.getElementById('saveBtn').className = "btn btn-green"; document.getElementById('cancelEditBtn').style.display = "none"; document.querySelectorAll('#calc input').forEach(inp => { if(inp.id !== 'pWood' && inp.id !== 'pBlocks') inp.value = ""; }); calculateLiveCost(); }
    function deleteModel(i) { if(confirm("Usunąć?")) { db.models.splice(i, 1); saveToCloud().then(() => { renderSelect(); renderModelEditList(); }); } }
    function renderSelect() { document.getElementById('palletSelect').innerHTML = db.models.map((m, i) => `<option value="${i}">${m.name}</option>`).join(''); updateProfitHint(); }

    function updateProfitHint() {
        const sPrice = parseFloat(document.getElementById('salePrice').value.replace(',', '.')) || 0;
        let cost = 0;
        if(saleMode === 'prod') {
            const idx = document.getElementById('palletSelect').value;
            if(db.models[idx]) cost = db.models[idx].cost;
        } else {
            cost = parseFloat(document.getElementById('buyCost').value.replace(',', '.')) || 0;
        }
        if(sPrice > 0) {
            const profit = sPrice - cost;
            document.getElementById('profitHint').innerHTML = `Zysk: <span style="color:${profit>=0?'var(--success)':'var(--danger)'}">${profit.toFixed(2)} PLN/szt.</span>`;
        } else document.getElementById('profitHint').innerText = "";
    }

    function addSale() {
        const qty = parseInt(document.getElementById('saleQty').value);
        const sPrice = parseFloat(document.getElementById('salePrice').value.replace(',', '.'));
        if(!qty || !sPrice) return alert("Błąd!");
        let name, unitCost;
        if(saleMode === 'prod') {
            const idx = document.getElementById('palletSelect').value;
            name = db.models[idx].name; unitCost = db.models[idx].cost;
        } else {
            name = "[Kupno] " + document.getElementById('buyName').value;
            unitCost = parseFloat(document.getElementById('buyCost').value.replace(',', '.')) || 0;
        }
        const d = new Date();
        db.sales.push({ id: Date.now().toString(), date: d.toLocaleDateString(), year: d.getFullYear(), month: (d.getMonth()+1).toString().padStart(2,'0') + '/' + d.getFullYear(), name: name, client: document.getElementById('clientName').value || "Brak", qty: qty, prof: (sPrice - unitCost) * qty, cost: unitCost * qty, rev: sPrice * qty });
        saveToCloud().then(ok => { if(ok) { document.getElementById('saleQty').value = ""; renderStats(); alert("Dodano!"); } });
    }

    function addWeeklySalary() {
        const dateInput = document.getElementById('salaryDate').value;
        const amount = parseFloat(document.getElementById('salaryAmount').value.replace(',', '.'));
        if(!dateInput || !amount) return alert("Wpisz datę i kwotę!");
        const fri = new Date(dateInput);
        const dayVal = amount / 5;
        for(let i=0; i<5; i++) {
            let d = new Date(fri); d.setDate(fri.getDate() - (4 - i));
            db.sales.push({
                id: "sal-" + Date.now() + i,
                date: d.toLocaleDateString(),
                year: d.getFullYear(),
                month: (d.getMonth()+1).toString().padStart(2,'0') + '/' + d.getFullYear(),
                name: "TYGODNIÓWKA", client: "Praca", qty: 0,
                prof: dayVal, cost: 0, rev: dayVal
            });
        }
        saveToCloud().then(() => { renderStats(); alert("Tygodniówka rozliczona!"); });
    }

    function renderStats() {
        const monthsContainer = document.getElementById('monthsContainer');
        const yearContainer = document.getElementById('yearStatsContainer');
        monthsContainer.innerHTML = ""; yearContainer.innerHTML = "";
        if(!db.sales || db.sales.length === 0) return;
        const curYear = new Date().getFullYear();
        let yS = { p: 0, c: 0, q: 0, r: 0 }; let mD = {};

        db.sales.forEach(s => {
            const rev = s.rev || (s.prof + s.cost);
            // FILTR BEZPIECZEŃSTWA: Tygodniówka to zawsze 0 sztuk, niezależnie co jest w bazie
            const qty = s.name === "TYGODNIÓWKA" ? 0 : (parseInt(s.qty) || 0);
            
            if(s.year == curYear) { yS.p += s.prof; yS.c += s.cost; yS.q += qty; yS.r += rev; }
            if(!mD[s.month]) mD[s.month] = { p: 0, c: 0, q: 0, items: [] };
            mD[s.month].p += s.prof; mD[s.month].c += s.cost; mD[s.month].q += qty; mD[s.month].items.push(s);
        });

        yearContainer.innerHTML = `<div class="year-box"><small>ZYSK ${curYear}</small><div style="font-size:28px; font-weight:800; color:var(--success); margin: 5px 0;">+${yS.p.toFixed(2)} PLN</div><div class="year-grid"><div>PRZYCHÓD<br><b style="color:white">${yS.r.toFixed(0)}</b></div><div>KOSZTY<br><b style="color:var(--danger)">${yS.c.toFixed(0)}</b></div><div>SZTUK<br><b style="color:var(--primary)">${yS.q}</b></div></div></div>`;

        Object.keys(mD).sort().reverse().forEach(m => {
            const data = mD[m];
            const div = document.createElement('div'); div.className = 'month-acc';
            let salarySum = 0;
            let normalItems = [];
            data.items.forEach(item => {
                if(item.name === "TYGODNIÓWKA") salarySum += item.prof;
                else normalItems.push(item);
            });
            let salaryHtml = salarySum > 0 ? `<tr class="salary-row"><td><b style="color:var(--warning)">TYGODNIÓWKA (SUMA)</b><br><small>Rozliczenie miesięczne</small></td><td style="text-align:center">-</td><td style="text-align:right"><b style="color:var(--success)">+${salarySum.toFixed(2)}</b><br><small style="font-size:8px; color:var(--text-dim)">rozliczone</small></td></tr>` : "";
            div.innerHTML = `<div class="month-header" onclick="toggleMonth('${m}')"><div><b>${m}</b></div><div style="text-align:right"><b style="color:var(--success)">+${data.p.toFixed(2)}</b><br><small>${data.q} szt.</small></div></div><div id="content-${m.replace('/','-')}" class="month-content"><table>${salaryHtml}${normalItems.slice().reverse().map(item => `<tr><td><b>${item.name}</b><br><small>${item.client} | ${item.date}</small></td><td style="text-align:center">x${item.qty}</td><td style="text-align:right"><b style="color:var(--success)">+${item.prof.toFixed(2)}</b><br><button class="btn-del" onclick="deleteSale('${item.id}')">usuń</button></td></tr>`).join('')}</table></div>`;
            monthsContainer.appendChild(div);
        });
    }

    function toggleMonth(m) { document.getElementById('content-' + m.replace('/','-')).classList.toggle('open'); }
    function deleteSale(id) { if(confirm("Usunąć?")) { db.sales = db.sales.filter(s => s.id !== id); saveToCloud().then(renderStats); } }
    function switchTab(id) { document.querySelectorAll('.card').forEach(c => c.classList.remove('active')); document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); document.getElementById(id).classList.add('active'); document.getElementById('tab' + (id==='calc'?'1':id==='sales'?'2':'3')).classList.add('active'); if(id === 'sales') renderSelect(); if(id === 'stats') renderStats(); }
</script>
<script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>
</html>
